app = 'input-dry-thunder-7019'
primary_region = 'ewr'

[build]

[build.args]
  VITE_WEBCONTAINERS_API_KEY = "wc_api_raykyri_0bbad417ec157a78c36ffa17c4a1fcf9"

[env]
  PORT = '8787'
  DATABASE_PATH = '/data/input.db'

[http_service]
  internal_port = 8787
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    grace_period = '20s'
    interval = '15s'
    method = 'GET'
    path = '/healthz'
    timeout = '5s'

[[vm]]
  memory = '1024mb'
  cpus = 2
  memory_mb = 1024

[[mounts]]
  source = 'data'
  destination = '/data'
