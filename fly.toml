app = 'input-dry-thunder-7019'
primary_region = 'ewr'

[build]

[env]
  PORT = '8787'
  DATABASE_PATH = '/data/input.db'

[http_service]
  internal_port = 8787
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = '256mb'
  cpus = 1
  memory_mb = 256

[[mounts]]
  source = 'data'
  destination = '/data'
